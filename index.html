<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<meta name="theme-color" content="#2c3e50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Patrimônio Mobile - Sistema</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    font-size: 14px;
    line-height: 1.5;
  }

  /* Login Screen - Mobile First */
  .login-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    padding: 16px;
  }

  .login-box {
    background: white;
    padding: 24px 20px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 320px;
  }

  .login-box h2 {
    text-align: center;
    margin-bottom: 24px;
    font-size: 24px;
    color: #333;
  }

  .login-box input {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    -webkit-appearance: none;
  }

  .login-box button {
    width: 100%;
    padding: 14px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }

  .login-box .info {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #666;
  }

  /* Main App - Mobile First */
  .main-app {
    display: none;
    padding: 12px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* User Bar - Mobile */
  .user-bar {
    background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
    color: white;
    padding: 12px 16px;
    border-radius: 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 14px;
  }

  .user-role {
    background: #e74c3c;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: bold;
  }

  .user-role.admin {
    background: #27ae60;
  }

  .btn-logout {
    background: #e74c3c;
    padding: 6px 16px;
    border: none;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
  }

  /* Dashboard Cards - Mobile Grid */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .card {
    background: white;
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .card:active {
    transform: scale(0.98);
  }

  .card-icon {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 11px;
    color: #666;
    margin-bottom: 4px;
  }

  .card-value {
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }

  /* Forms - Mobile */
  .form-container {
    background: white;
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  .form-group {
    margin-bottom: 12px;
  }

  label {
    font-weight: 600;
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #555;
  }

  input, select, button {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    -webkit-appearance: none;
    background: white;
  }

  button {
    background: #27ae60;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
  }

  button:active {
    transform: scale(0.98);
  }

  button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  /* Modo Buttons - Mobile Scroll Horizontal */
  .modo-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .modo-buttons button {
    flex: 0 0 auto;
    padding: 10px 20px;
    background: #7f8c8d;
    font-size: 13px;
    white-space: nowrap;
  }

  .modo-buttons button.active {
    background: #2c3e50;
  }

  /* Tabela - Mobile (Scroll Horizontal) */
  .tabs {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  table {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  th, td {
    padding: 12px 8px;
    text-align: left;
    font-size: 12px;
    border-bottom: 1px solid #eee;
  }

  th {
    background: #34495e;
    color: white;
    font-weight: 600;
    font-size: 12px;
  }

  tr:last-child td {
    border-bottom: none;
  }

  /* Ações em Mobile - Botões pequenos */
  .action-buttons {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .btn-small {
    width: auto;
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 8px;
    margin: 2px;
  }

  .btn-edit { background: #3498db; }
  .btn-delete { background: #e74c3c; }
  .btn-baixa { background: #f39c12; }
  .btn-react { background: #27ae60; }

  /* Status Colors */
  .item-analise { background: #fff9c4; }
  .item-baixado { background: #ffebee; opacity: 0.7; text-decoration: line-through; }

  /* Tabs - Mobile */
  .tab-buttons {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .tab-buttons button {
    background: #bdc3c7;
    padding: 8px 16px;
    font-size: 12px;
    white-space: nowrap;
    flex: 0 0 auto;
  }

  .tab-buttons button.active {
    background: #2c3e50;
  }

  .tab-content {
    display: none;
  }

  .tab-content.active {
    display: block;
  }

  /* Modal - Mobile */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
  }

  .modal-content {
    background: white;
    margin: 20px auto;
    padding: 20px;
    border-radius: 20px;
    width: calc(100% - 40px);
    max-width: 400px;
    position: relative;
    top: 50%;
    transform: translateY(-50%);
  }

  .close {
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    color: #999;
  }

  /* Pesquisa */
  #pesquisa {
    font-size: 16px;
  }

  /* Loading e mensagens */
  .loading {
    text-align: center;
    padding: 40px;
    color: #666;
  }

  /* Ajustes para telas muito pequenas */
  @media (max-width: 480px) {
    .main-app {
      padding: 8px;
    }
    
    .dashboard {
      gap: 8px;
    }
    
    .card {
      padding: 10px;
    }
    
    .card-icon {
      font-size: 24px;
    }
    
    .card-value {
      font-size: 20px;
    }
    
    th, td {
      padding: 8px 6px;
      font-size: 11px;
    }
    
    .btn-small {
      padding: 4px 8px;
      font-size: 10px;
    }
  }

  /* Landscape mode */
  @media (min-width: 768px) {
    .main-app {
      max-width: 1200px;
      padding: 20px;
    }
    
    .dashboard {
      grid-template-columns: repeat(5, 1fr);
      gap: 15px;
    }
    
    table {
      min-width: auto;
    }
  }

  /* Touch optimizations */
  button, 
  .tab-buttons button,
  .modo-buttons button,
  .card {
    cursor: pointer;
    touch-action: manipulation;
  }

  /* Scrollbar personalizada */
  ::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }

  ::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 4px;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<!-- TELA DE LOGIN MOBILE -->
<div id="loginContainer" class="login-container">
  <div class="login-box">
    <h2>📱 Patrimônio Mobile</h2>
    <input type="text" id="loginUser" placeholder="Usuário" autocomplete="off">
    <input type="password" id="loginPassword" placeholder="Senha">
    <button onclick="fazerLogin()">🔐 Entrar</button>
    <div class="info">
      👑 Admin: admin / admin123<br>
      👤 User: user / user123
    </div>
    <div id="loginError" style="color:#e74c3c; text-align:center; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<!-- SISTEMA PRINCIPAL MOBILE -->
<div id="mainApp" class="main-app">
  <!-- BARRA DO USUÁRIO -->
  <div class="user-bar">
    <div class="user-info">
      <span>👋 <strong id="userNameDisplay"></strong></span>
      <span id="userRoleDisplay" class="user-role"></span>
    </div>
    <button class="btn-logout" onclick="logout()">🚪 Sair</button>
  </div>

  <!-- DASHBOARD CARDS -->
  <div class="dashboard">
    <div class="card" onclick="filtrarPorStatus('todos')">
      <div class="card-icon">📦</div>
      <div class="card-title">Total</div>
      <div class="card-value" id="totalItens">0</div>
    </div>
    <div class="card" onclick="filtrarPorStatus('ativo')" style="border-left: 3px solid #27ae60;">
      <div class="card-icon">✅</div>
      <div class="card-title">Ativos</div>
      <div class="card-value" id="totalAtivos">0</div>
    </div>
    <div class="card" onclick="filtrarPorStatus('analise')" style="border-left: 3px solid #f39c12;">
      <div class="card-icon">⚠️</div>
      <div class="card-title">Análise</div>
      <div class="card-value" id="totalAnalise">0</div>
    </div>
    <div class="card" onclick="filtrarPorStatus('baixado')" style="border-left: 3px solid #e74c3c;">
      <div class="card-icon">🗑️</div>
      <div class="card-title">Baixados</div>
      <div class="card-value" id="totalBaixados">0</div>
    </div>
    <div class="card">
      <div class="card-icon">📍</div>
      <div class="card-title">Locais</div>
      <div class="card-value" id="totalLocais">0</div>
    </div>
  </div>

  <!-- BOTÕES RÁPIDOS -->
  <div class="modo-buttons">
    <button onclick="exportar()">📥 Backup</button>
    <button onclick="document.getElementById('importFile').click()">📤 Importar</button>
    <button onclick="gerarRelatorioGeral()">🖨️ Geral</button>
    <button onclick="gerarRelatorioBaixados()">📋 Baixados</button>
    <input type="file" id="importFile" hidden onchange="importar(event)">
  </div>

  <!-- FORMULÁRIO -->
  <div class="form-container" id="formCadastro">
    <div class="form-group">
      <label>🔍 Pesquisar</label>
      <input id="pesquisa" placeholder="Nº do patrimônio...">
    </div>
    <div class="form-group">
      <label>📝 N° (espaço para múltiplos)</label>
      <input id="numero" placeholder="Ex: 123 456">
    </div>
    <div class="form-group">
      <label>📍 Local</label>
      <select id="local">
        <option value="">Selecione</option>
        <option>Sala 01</option><option>Sala 02</option><option>Sala 03</option>
        <option>Sala 04</option><option>Sala 05</option><option>Secretaria</option>
        <option>Direção</option><option>Biblioteca</option><option>Sala Informática</option>
        <option>Depósito</option><option>Não localizado</option>
      </select>
    </div>
    <div class="form-group">
      <label>📦 Descrição</label>
      <select id="descricao">
        <option value="">Selecione</option>
        <option>Computador</option><option>Monitor</option><option>Cadeira</option>
        <option>Mesa</option><option>Armário</option><option>Impressora</option>
        <option>Ar Condicionado</option><option>Ventilador</option><option>TV</option>
      </select>
    </div>
    <button id="btnAdicionar" onclick="adicionar()">➕ Adicionar</button>
  </div>

  <!-- VISUALIZAÇÃO -->
  <div class="modo-buttons">
    <button id="btnLocal" onclick="setModo('local')">📂 Por Local</button>
    <button id="btnDescricao" onclick="setModo('descricao')">🏷️ Por Descrição</button>
  </div>

  <div class="tabs">
    <div class="tab-buttons" id="tabButtons"></div>
    <div id="tabContents"></div>
  </div>
</div>

<!-- MODAL EDIÇÃO -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModal()">&times;</span>
    <h3 style="margin-bottom: 16px;">✏️ Editar</h3>
    <div class="form-group"><label>Número</label><input id="editNumero" type="text"></div>
    <div class="form-group"><label>Local</label><select id="editLocal"></select></div>
    <div class="form-group"><label>Descrição</label><select id="editDescricao"></select></div>
    <div class="form-group"><label>Status</label>
      <select id="editStatus">
        <option value="ativo">✅ Ativo</option>
        <option value="analise">⚠️ Em Análise</option>
        <option value="baixado">🗑️ Baixado</option>
      </select>
    </div>
    <button onclick="salvarEdicao()">💾 Salvar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC6UbTClmCouKf9GBR-nUjWfIsMk9qhPdM",
  authDomain: "controlepatrimonio-f26a4.firebaseapp.com",
  databaseURL: "https://controlepatrimonio-f26a4-default-rtdb.firebaseio.com",
  projectId: "controlepatrimonio-f26a4",
  storageBucket: "controlepatrimonio-f26a4.firebasestorage.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USUÁRIOS
let currentUser = null;
const users = {
  'admin': { password: 'admin123', role: 'admin', name: 'Admin' },
  'user': { password: 'user123', role: 'user', name: 'Usuário' }
};

let dados = [];
let modo = 'local';
let editandoId = null;

// LOGIN
function fazerLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPassword').value;
  const user = users[username];
  
  if (user && user.password === password) {
    currentUser = { username, role: user.role, name: user.name };
    sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
    
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userNameDisplay').textContent = currentUser.name;
    
    const roleSpan = document.getElementById('userRoleDisplay');
    roleSpan.textContent = currentUser.role === 'admin' ? 'ADMIN' : 'USER';
    roleSpan.classList.toggle('admin', currentUser.role === 'admin');
    
    aplicarRestricoes();
    document.getElementById('loginError').textContent = '';
  } else {
    document.getElementById('loginError').textContent = 'Usuário/senha inválidos';
  }
}

function logout() {
  currentUser = null;
  sessionStorage.removeItem('currentUser');
  document.getElementById('loginContainer').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}

function aplicarRestricoes() {
  const isAdmin = currentUser?.role === 'admin';
  const inputs = document.querySelectorAll('#formCadastro input, #formCadastro select');
  const btnAdd = document.getElementById('btnAdicionar');
  
  inputs.forEach(input => { if (input.id !== 'pesquisa') input.disabled = !isAdmin; });
  btnAdd.disabled = !isAdmin;
  if (!isAdmin) btnAdd.style.opacity = '0.5';
}

function verificarSessao() {
  const saved = sessionStorage.getItem('currentUser');
  if (saved) {
    currentUser = JSON.parse(saved);
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userNameDisplay').textContent = currentUser.name;
    const roleSpan = document.getElementById('userRoleDisplay');
    roleSpan.textContent = currentUser.role === 'admin' ? 'ADMIN' : 'USER';
    roleSpan.classList.toggle('admin', currentUser.role === 'admin');
    aplicarRestricoes();
  }
}

// FIREBASE
db.ref("patrimonios").on("value", (snapshot) => {
  const val = snapshot.val();
  dados = val ? Object.keys(val).map(key => ({ id: key, ...val[key] })) : [];
  renderizar();
  atualizarDashboard();
});

function atualizarDashboard() {
  document.getElementById('totalItens').textContent = dados.length;
  document.getElementById('totalAtivos').textContent = dados.filter(d => d.status === 'ativo').length;
  document.getElementById('totalAnalise').textContent = dados.filter(d => d.status === 'analise').length;
  document.getElementById('totalBaixados').textContent = dados.filter(d => d.status === 'baixado').length;
  document.getElementById('totalLocais').textContent = [...new Set(dados.map(d => d.local))].length;
}

function filtrarPorStatus(status) {
  if (status === 'todos') {
    document.getElementById('pesquisa').value = '';
    renderizar();
  } else {
    alert(`📱 Filtro: ${status === 'ativo' ? 'Ativos' : status === 'analise' ? 'Em Análise' : 'Baixados'}\nUse a busca para filtrar`);
  }
}

// CRUD
function adicionar() {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  
  const numerosStr = document.getElementById('numero').value.trim();
  const local = document.getElementById('local').value;
  const descricao = document.getElementById('descricao').value;
  
  if (!numerosStr || !local || !descricao) return alert('Preencha todos os campos!');
  
  const numeros = numerosStr.split(/\s+/);
  const validos = numeros.filter(num => !dados.some(d => String(d.numero) === num));
  
  if (validos.length === 0) return alert('Todos os números já existem!');
  
  validos.forEach(num => {
    db.ref("patrimonios").push({
      numero: num, local, descricao, status: 'ativo',
      dataCadastro: new Date().toISOString(),
      dataModificacao: new Date().toISOString()
    });
  });
  
  alert(`✅ ${validos.length} item(ns) cadastrado(s)!`);
  document.getElementById('numero').value = '';
}

function excluir(id) {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  if (confirm('Excluir permanentemente?')) db.ref("patrimonios").child(id).remove();
}

function colocarEmAnalise(id) {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  db.ref("patrimonios").child(id).update({ status: 'analise', dataModificacao: new Date().toISOString() });
}

function darBaixa(id) {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  db.ref("patrimonios").child(id).update({ status: 'baixado', dataModificacao: new Date().toISOString() });
}

function reativar(id) {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  db.ref("patrimonios").child(id).update({ status: 'ativo', dataModificacao: new Date().toISOString() });
}

function editar(id) {
  if (currentUser?.role !== 'admin') return alert('Apenas administradores!');
  const item = dados.find(d => d.id === id);
  if (!item) return;
  
  editandoId = id;
  document.getElementById('editNumero').value = item.numero;
  document.getElementById('editLocal').innerHTML = `<option>${item.local}</option>` + document.getElementById('local').innerHTML;
  document.getElementById('editDescricao').innerHTML = `<option>${item.descricao}</option>` + document.getElementById('descricao').innerHTML;
  document.getElementById('editStatus').value = item.status;
  document.getElementById('editModal').style.display = 'block';
}

function fecharModal() {
  document.getElementById('editModal').style.display = 'none';
  editandoId = null;
}

function salvarEdicao() {
  if (!editandoId) return;
  db.ref("patrimonios").child(editandoId).update({
    numero: document.getElementById('editNumero').value,
    local: document.getElementById('editLocal').value,
    descricao: document.getElementById('editDescricao').value,
    status: document.getElementById('editStatus').value,
    dataModificacao: new Date().toISOString()
  });
  fecharModal();
  alert('✅ Atualizado!');
}

function formatarData(dataISO) {
  return dataISO ? new Date(dataISO).toLocaleString('pt-BR') : 'N/A';
}

// RELATÓRIOS
function gerarRelatorioGeral() {
  const ativos = dados.filter(d => d.status !== 'baixado');
  imprimirRelatorio('Relatório Geral - Ativos', ativos);
}

function gerarRelatorioBaixados() {
  const baixados = dados.filter(d => d.status === 'baixado');
  imprimirRelatorio('Relatório de Baixados', baixados);
}

function imprimirRelatorio(titulo, lista) {
  let html = `<html><head><title>${titulo}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:sans-serif;padding:16px}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #ccc;padding:10px;text-align:left}
    th{background:#f0f0f0}
    @media (max-width: 600px){th,td{font-size:12px;padding:6px}}
  </style>
  </head><body>
  <h2>${titulo}</h2>
  <p>Gerado: ${new Date().toLocaleString()}</p>
  <table><thead><tr><th>Nº</th><th>Descrição</th><th>Local</th><th>Status</th></tr></thead><tbody>`;
  lista.forEach(i => {
    let statusText = i.status === 'analise' ? '⚠️ Análise' : i.status === 'baixado' ? '❌ Baixado' : '✅ Ativo';
    html += `<tr><td>${i.numero}</td><td>${i.descricao}</td><td>${i.local}</td><td>${statusText}</td></tr>`;
  });
  html += `</tbody></table><script>window.print()<\/script></body></html>`;
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

// EXPORT/IMPORT
function exportar() {
  const blob = new Blob([JSON.stringify(dados, null, 2)], { type: "application/json" });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `patrimonio_${new Date().toISOString().slice(0,19)}.json`;
  a.click();
}

function importar(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const importados = JSON.parse(ev.target.result);
      if (confirm(`Importar ${importados.length} itens?`)) {
        importados.forEach(item => db.ref("patrimonios").push(item));
        alert('✅ Importado!');
      }
    } catch(err) { alert('Arquivo inválido'); }
  };
  reader.readAsText(file);
}

// RENDERIZAÇÃO
function setModo(m) {
  modo = m;
  document.getElementById('btnLocal').classList.toggle('active', m === 'local');
  document.getElementById('btnDescricao').classList.toggle('active', m === 'descricao');
  renderizar();
}

function renderizar() {
  const filtro = document.getElementById('pesquisa').value.toLowerCase();
  let filtrados = dados.filter(d => String(d.numero).toLowerCase().includes(filtro));
  
  const tabButtons = document.getElementById('tabButtons');
  const tabContents = document.getElementById('tabContents');
  tabButtons.innerHTML = '';
  tabContents.innerHTML = '';
  
  if (filtrados.length === 0) {
    tabContents.innerHTML = '<div style="text-align:center;padding:40px;">📭 Nenhum resultado</div>';
    return;
  }
  
  const isAdmin = currentUser?.role === 'admin';
  const campo = modo === 'local' ? 'local' : 'descricao';
  const grupos = [...new Set(filtrados.map(d => d[campo]))].sort();
  
  grupos.forEach((grupo, idx) => {
    const btn = document.createElement('button');
    btn.textContent = grupo.length > 20 ? grupo.substring(0, 17) + '...' : grupo;
    btn.onclick = () => ativarAba(idx);
    tabButtons.appendChild(btn);
    
    const div = document.createElement('div');
    div.className = 'tab-content';
    const itens = filtrados.filter(d => d[campo] === grupo);
    
    let html = `<div style="overflow-x:auto;"><table><thead><tr>
      <th>Nº</th><th>Local</th><th>Descrição</th><th>Status</th><th>Modif</th>${isAdmin ? '<th>Ações</th>' : ''}
    </tr></thead><tbody>`;
    
    itens.forEach(d => {
      let rowClass = '';
      let statusText = '';
      if (d.status === 'baixado') { rowClass = 'item-baixado'; statusText = '🗑️'; }
      else if (d.status === 'analise') { rowClass = 'item-analise'; statusText = '⚠️'; }
      else statusText = '✅';
      
      html += `<tr class="${rowClass}">
        <td><strong>${d.numero}</strong></td>
        <td>${d.local.length > 12 ? d.local.substring(0, 10) + '..' : d.local}</td>
        <td>${d.descricao.length > 12 ? d.descricao.substring(0, 10) + '..' : d.descricao}</td>
        <td>${statusText}</td>
        <td><small>${formatarData(d.dataModificacao).slice(0,10)}</small></td>`;
      if (isAdmin) {
        html += `<td class="action-buttons">
          <button class="btn-small btn-edit" onclick="editar('${d.id}')">✏️</button>
          ${d.status === 'baixado' ? 
            `<button class="btn-small btn-react" onclick="reativar('${d.id}')">🔄</button>` :
            d.status === 'analise' ?
            `<button class="btn-small btn-react" onclick="reativar('${d.id}')">✔️</button>
             <button class="btn-small btn-baixa" onclick="darBaixa('${d.id}')">🗑️</button>` :
            `<button class="btn-small btn-baixa" onclick="colocarEmAnalise('${d.id}')">⚠️</button>
             <button class="btn-small btn-baixa" onclick="darBaixa('${d.id}')">🗑️</button>`
          }
          <button class="btn-small btn-delete" onclick="excluir('${d.id}')">❌</button>
         </td>`;
      }
      html += `</tr>`;
    });
    html += `</tbody></table></div>`;
    div.innerHTML = html;
    tabContents.appendChild(div);
  });
  ativarAba(0);
}

function ativarAba(i) {
  const btns = document.querySelectorAll('.tab-buttons button');
  const contents = document.querySelectorAll('.tab-content');
  btns.forEach((b, idx) => b.classList.toggle('active', idx === i));
  contents.forEach((c, idx) => c.classList.toggle('active', idx === i));
}

// INICIAR
verificarSessao();
setModo('local');

// Fechar modal ao clicar fora
window.onclick = function(event) {
  const modal = document.getElementById('editModal');
  if (event.target === modal) fecharModal();
}
</script>
